name: Publish bot Docker image

# Build and push the bot image to GHCR on bot-specific version tags
# (e.g. bot-v0.1.0), independent of the app's own v*.*.* releases.
# Produces image tags: 0.1.0, 0, latest on ghcr.io/<owner>/<repo>/bot
on:
  push:
    tags:
      - 'bot-v*.*.*'

env:
  REGISTRY: ghcr.io
  # Nested package under the repo: ghcr.io/floholz/wm-pickems/bot
  IMAGE_NAME: ${{ github.repository }}/bot

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Strip the "bot-v" prefix from the git tag:
          # bot-v0.1.0 -> 0.1.0 (full) and 0 (major), plus latest.
          tags: |
            type=match,pattern=bot-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=bot-v(\d+),group=1
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bots
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # OCI labels live in the Dockerfile; feed it the dynamic values.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
