name: CI (bot)

# Build/vet/test gate for the bots/ Go module. Path-filtered so it only runs
# when the bot changes. It does NOT make live Claude calls (no API key, no
# server in CI) — it builds, vets, and runs the offline unit tests (the bracket
# resolver). A real end-to-end run is a manual smoke test.
on:
  push:
    paths:
      - 'bots/**'
      - '.github/workflows/ci-bot.yml'
  pull_request:
    paths:
      - 'bots/**'
      - '.github/workflows/ci-bot.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bots
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: bots/go.mod
          cache-dependency-path: bots/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
