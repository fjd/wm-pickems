{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "subject" .}}{{.AppName}}{{end}}</title>
</head>
<body style="margin:0;padding:0;background:#080b14;color:#f3f5fb;font-family:'Archivo',system-ui,-apple-system,'Segoe UI',sans-serif;">
<div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{block "preheader" .}}{{end}}</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#080b14;padding:24px 12px;">
<tr><td align="center">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#10131f;border:1px solid #283047;border-radius:16px;overflow:hidden;">
<tr><td style="padding:20px 28px;border-bottom:1px solid #283047;">
<span style="font-size:18px;font-weight:800;letter-spacing:.02em;color:#c8fb50;">{{.AppName}}</span>
</td></tr>
<tr><td style="padding:28px;">
{{block "content" .}}{{end}}
{{if .CTAUrl}}<table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0 4px;"><tr><td style="border-radius:999px;background:#c8fb50;">
<a href="{{.CTAUrl}}" style="display:inline-block;padding:12px 26px;font-weight:700;font-size:15px;color:#08110a;text-decoration:none;">{{.CTAText}}</a>
</td></tr></table>{{end}}
</td></tr>
<tr><td style="padding:18px 28px;border-top:1px solid #283047;color:#8b93b0;font-size:12px;line-height:1.6;">
You're receiving this because you have notifications enabled.
<a href="{{.SettingsUrl}}" style="color:#8b93b0;text-decoration:underline;">Manage your notifications</a>.
</td></tr>
</table>
</td></tr>
</table>
</body>
</html>{{end}}
